version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: robocon
      POSTGRES_PASSWORD: password
      POSTGRES_DB: robocon
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/robocon-rules;
      mc mb --ignore-existing local/robocon-submissions;
      exit 0;
      "

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgres://robocon:password@db:5432/robocon
      PORT: 8787
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_RULES: robocon-rules
      S3_BUCKET_SUBMISSIONS: robocon-submissions
      S3_FORCE_PATH_STYLE: "true"
      BETTER_AUTH_SECRET: change-me
      BETTER_AUTH_URL: http://localhost:8787
      APP_URL: http://localhost:3000
      EMAIL_PROVIDER: console
    depends_on:
      - db
      - minio
    ports:
      - "8787:8787"
